# =============================================================================
# arrangement.toml — このアレンジの「正本(source of truth)」
#
# ここを編集すれば compose / setup / load / status すべてに反映される。
# Reaper は描画先（片方向）。手で Reaper を編集しても正本はここ。
# 「今ならんでいる内容」を知りたいときはこのファイルを読む（Reaper 不要）。
#
# 反映フロー:
#   uv run python isobar/compose.py   # spec -> output/*.mid 生成
#   uv run python reaper/setup.py     # spec -> トラック/サンプラを冪等反映
#   uv run python reaper/load.py      # output/*.mid を各トラックへ流し込み
#   uv run python reaper/status.py    # 走行中 Reaper と spec の差分表示
# =============================================================================

bpm  = 138
bars = 4

# ReaSamplomatic5000 のトリガノート（C4=60）。全ドラムトラック共通。
sampler_note = 60

# sample_root: 各トラックの sample はここからの相対パス（区切りは Linux の '/'）。
# 相対指定なら arrangement.toml の場所基準で解決される（spec.py）。
#   合成音源で代用する場合: 'samples'（samples/gen_kick.py 等で生成）
#   Windows 復帰時の元パス : 'C:\Users\fox10\Music\Samples\Black Octopus\Trance Vision'
sample_root = '/mnt/shared/DTM/Samples/Black Octopus/Trance Vision'

# スケール（現状はサンプラ1音固定で未使用。lead/synth 追加時に使う想定で保持）
[scale]
root = "A"
name = "phrygian"   # intervals: 0,1,3,5,7,8,10

# -----------------------------------------------------------------------------
# tracks: 上から順に Reaper トラックとして並ぶ
#   rhythm.type = "steps": "x...x..." を直接書く (非'.'=ヒット, 1小節ぶん, 以降ループ)
#   rhythm.type = "euclidean": hits 個のヒットを steps 個へ均等配置
#   step       : 1ステップの拍数 (0.25=16分)
#   velocity   : 数値=固定 / 配列=循環シーケンス
#   volume_db  : トラック音量 (dB, 0=ユニティ)。setup.py が D_VOL に反映
#   group      : 同名の track をまとめる Reaper folder(バス)。省略=トップレベル。
#                同一グループの track は連続して並べること(非連続はエラー)。
#                親バスは自動生成され sample/RS5k を持たない(ユニティ音量)。
# -----------------------------------------------------------------------------
# オーソドックスなトランス・ドラム (16分グリッド):
#   step:  1 e & a 2 e & a 3 e & a 4 e & a
#   kick   x . . . x . . . x . . . x . . .   4つ打ち
#   clap   . . . . x . . . . . . . x . . .   2拍4拍
#   ohat   . . x . . . x . . . x . . . x .   オフビート・オープンハット
#   bass   . . x . . . x . . . x . . . x .   オフベース (kickの裏)
# -----------------------------------------------------------------------------

[[tracks]]
name      = "kick"
group     = "drums"
sample    = 'Drum - Kick - One Shots/DPT_Kick_One_Shot_Acidtech.wav'
step      = 0.25
velocity  = 120
volume_db = -8.0
rhythm    = { type = "steps", pattern = "x...x...x...x..." }

[[tracks]]
name      = "clap"
group     = "drums"
sample    = 'Drum - Clap - One Shots/DPT_Clap_One_Shot_Sola.wav'
step      = 0.25
velocity  = 105
volume_db = -10.8
rhythm    = { type = "steps", pattern = "....x.......x..." }

[[tracks]]
name      = "ohat"
group     = "drums"
sample    = 'Drum - Hat Open - One Shot/DPT_Hat_Open_One_Shot_Azureshort.wav'
step      = 0.25
velocity  = 95
volume_db = -12.0
rhythm    = { type = "steps", pattern = "..x...x...x...x." }

[[tracks]]
name      = "bass"
sample    = 'Bass - One Shot/DPT_A_Bass_One_Shot_Rez.wav'
step      = 0.25
velocity  = 100
volume_db = -9.0
rhythm    = { type = "steps", pattern = "..x...x...x...x." }
